<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forehead Word Game</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #111 0%, #1a1a2e 100%);
  color: white;
  padding: 20px;
  min-height: 100vh;
}

.container {
  max-width: 600px;
  margin: 0 auto;
}

h2 {
  font-size: 32px;
  margin-bottom: 20px;
  text-shadow: 0 2px 10px rgba(255, 77, 109, 0.5);
}

h3 {
  font-size: 20px;
  margin: 15px 0 10px 0;
  color: #ff4d6d;
}

input, button, select {
  padding: 12px;
  margin: 8px 5px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
}

input {
  background: #2a2a3e;
  color: white;
  width: 100%;
  max-width: 300px;
  margin: 8px auto;
  display: block;
}

input::placeholder {
  color: #888;
}

button {
  background: #ff4d6d;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #ff2d4d;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
}

button:active {
  transform: translateY(0);
}

select {
  background: #2a2a3e;
  color: white;
  width: 100%;
  max-width: 300px;
  margin: 8px auto;
  display: block;
}

.hidden {
  display: none;
}

#wordDisplay {
  font-size: 48px;
  margin: 60px 0;
  font-weight: bold;
  min-height: 60px;
  padding: 20px;
  background: rgba(255, 77, 109, 0.1);
  border-radius: 15px;
  border: 3px solid #ff4d6d;
}

.info-box {
  background: rgba(255, 77, 109, 0.15);
  padding: 15px;
  border-radius: 10px;
  margin: 15px 0;
  border-left: 4px solid #ff4d6d;
}

.timer {
  font-size: 24px;
  font-weight: bold;
  color: #ff4d6d;
  margin: 15px 0;
}

.timer.warning {
  color: #ff9d1d;
  animation: pulse 0.5s infinite;
}

.timer.danger {
  color: #ff4444;
  animation: pulse 0.3s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.player-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin: 15px 0;
}

.player-badge {
  background: #2a2a3e;
  padding: 10px 15px;
  border-radius: 20px;
  font-size: 14px;
  border: 2px solid #555;
}

.player-badge.active {
  border-color: #ff4d6d;
  background: rgba(255, 77, 109, 0.2);
}

.stats-table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
  font-size: 14px;
}

.stats-table th, .stats-table td {
  padding: 10px;
  border-bottom: 1px solid #444;
}

.stats-table th {
  background: rgba(255, 77, 109, 0.2);
  color: #ff4d6d;
}

.button-group {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0;
}

.button-group button {
  flex: 1;
  min-width: 100px;
}

.round-info {
  font-size: 18px;
  color: #ff4d6d;
  margin: 10px 0;
  font-weight: bold;
}

.word-count {
  font-size: 14px;
  color: #aaa;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">

<!-- SETUP SCREEN -->
<div id="setupScreen">
  <h2>🎮 Forehead Word Game</h2>
  
  <div class="info-box">
    <p>👥 Add player names first, then add words to play!</p>
  </div>

  <h3>👥 Add Players</h3>
  <input id="playerInput" placeholder="Enter player name">
  <button onclick="addPlayer()">Add Player</button>
  <div class="player-list" id="playerList"></div>

  <h3>📝 Add Words</h3>
  <input id="wordInput" placeholder="Enter a word">
  <button onclick="addWord()">Add Word</button>
  <div class="word-count" id="wordCount"></div>

  <h3>⏱️ Game Settings</h3>
  <label>Turn Time Limit (seconds):</label>
  <select id="timerSelect">
    <option value="0">No Timer</option>
    <option value="30">30 seconds</option>
    <option value="60" selected>60 seconds</option>
    <option value="90">90 seconds</option>
    <option value="120">2 minutes</option>
  </select>

  <button onclick="startGame()" style="margin-top: 20px; width: 100%; max-width: 300px; padding: 15px; font-size: 18px;">START GAME</button>
</div>

<!-- PASS SCREEN -->
<div id="passScreen" class="hidden">
  <h2>📱 Pass the Phone</h2>
  <div class="info-box">
    <p>Next player, look away! 👀</p>
    <div class="round-info" id="roundDisplay"></div>
    <div id="currentPlayerDisplay"></div>
  </div>
  <button onclick="startTurn()" style="width: 100%; max-width: 300px; padding: 15px; font-size: 18px;">I'm Ready! ➡️</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">
  <h2>🎯 Your Word</h2>
  
  <div class="round-info" id="gameRoundDisplay"></div>
  <div id="gamePlayerDisplay" style="font-size: 18px; margin: 10px 0; color: #ff4d6d;"></div>
  
  <div id="wordDisplay">Tap to Reveal</div>
  
  <div id="timerDisplay" class="timer hidden"></div>
  
  <div class="button-group">
    <button onclick="showWord()">👁️ Reveal</button>
    <button onclick="nextPlayer()">✅ Got It</button>
    <button onclick="lose()">💀 Lost</button>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameOverScreen" class="hidden">
  <h2>🏆 Game Over!</h2>
  
  <div class="info-box">
    <table class="stats-table">
      <thead>
        <tr>
          <th>Player</th>
          <th>Correct</th>
          <th>Lost</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="statsBody">
      </tbody>
    </table>
  </div>

  <button onclick="resetGame()" style="width: 100%; max-width: 300px; padding: 15px; font-size: 18px; margin-top: 20px;">Play Again</button>
</div>

</div>

<script>
let players = [];
let words = [];
let currentPlayerIndex = 0;
let currentRound = 1;
let gameActive = false;
let timerLimit = 60;
let timerInterval = null;
let timeRemaining = 0;

const playerStats = {};

function addPlayer() {
  const input = document.getElementById("playerInput");
  const name = input.value.trim();
  
  if (!name) {
    alert("Please enter a player name");
    return;
  }
  
  if (players.includes(name)) {
    alert("Player already added!");
    return;
  }
  
  players.push(name);
  playerStats[name] = { correct: 0, lost: 0, total: 0 };
  input.value = "";
  updatePlayerDisplay();
}

function updatePlayerDisplay() {
  const playerList = document.getElementById("playerList");
  playerList.innerHTML = players.map(p => `
    <div class="player-badge">${p}</div>
  `).join("");
}

function removePlayer(name) {
  players = players.filter(p => p !== name);
  delete playerStats[name];
  updatePlayerDisplay();
}

function addWord() {
  const input = document.getElementById("wordInput");
  const word = input.value.trim();
  
  if (!word) {
    alert("Please enter a word");
    return;
  }
  
  words.push(word);
  input.value = "";
  document.getElementById("wordCount").innerText = `Total Words: ${words.length}`;
}

function startGame() {
  if (players.length < 2) {
    alert("Add at least 2 players!");
    return;
  }
  
  if (words.length < 2) {
    alert("Add at least 2 words!");
    return;
  }
  
  timerLimit = parseInt(document.getElementById("timerSelect").value);
  gameActive = true;
  currentPlayerIndex = 0;
  currentRound = 1;
  
  document.getElementById("setupScreen").classList.add("hidden");
  showPassScreen();
}

function showPassScreen() {
  const currentPlayer = players[currentPlayerIndex];
  document.getElementById("roundDisplay").innerText = `Round ${currentRound} of ${words.length}`;
  document.getElementById("currentPlayerDisplay").innerText = `Player: ${currentPlayer}`;
  document.getElementById("passScreen").classList.remove("hidden");
  document.getElementById("gameScreen").classList.add("hidden");
}

function startTurn() {
  document.getElementById("passScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
  
  const currentPlayer = players[currentPlayerIndex];
  document.getElementById("gamePlayerDisplay").innerText = `🎭 ${currentPlayer}'s Turn`;
  document.getElementById("gameRoundDisplay").innerText = `Round ${currentRound} of ${words.length}`;
  
  document.getElementById("wordDisplay").innerText = "Tap to Reveal";
  const randomIndex = Math.floor(Math.random() * words.length);
  document.getElementById("wordDisplay").dataset.word = words[randomIndex];
  
  if (timerLimit > 0) {
    startTimer();
  }
}

function startTimer() {
  timeRemaining = timerLimit;
  const timerDisplay = document.getElementById("timerDisplay");
  timerDisplay.classList.remove("hidden");
  timerDisplay.innerText = formatTime(timeRemaining);
  
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeRemaining--;
    timerDisplay.innerText = formatTime(timeRemaining);
    
    if (timeRemaining <= 10) {
      timerDisplay.classList.add("warning");
    }
    if (timeRemaining <= 5) {
      timerDisplay.classList.remove("warning");
      timerDisplay.classList.add("danger");
    }
    
    if (timeRemaining <= 0) {
      clearInterval(timerInterval);
      alert("⏰ Time's up!");
      lose();
    }
  }, 1000);
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
}

function showWord() {
  const word = document.getElementById("wordDisplay").dataset.word;
  document.getElementById("wordDisplay").innerText = word;
}

function nextPlayer() {
  clearInterval(timerInterval);
  const currentPlayer = players[currentPlayerIndex];
  playerStats[currentPlayer].correct++;
  playerStats[currentPlayer].total++;
  
  currentPlayerIndex++;
  currentRound++;
  
  if (currentRound > words.length) {
    endGame();
  } else {
    showPassScreen();
  }
}

function lose() {
  clearInterval(timerInterval);
  const currentPlayer = players[currentPlayerIndex];
  playerStats[currentPlayer].lost++;
  playerStats[currentPlayer].total++;
  
  currentPlayerIndex++;
  currentRound++;
  
  if (currentRound > words.length) {
    endGame();
  } else {
    showPassScreen();
  }
}

function endGame() {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("gameOverScreen").classList.remove("hidden");
  
  const statsBody = document.getElementById("statsBody");
  statsBody.innerHTML = players.map(p => {
    const stats = playerStats[p];
    return `
      <tr>
        <td>${p}</td>
        <td>${stats.correct}</td>
        <td>${stats.lost}</td>
        <td>${stats.total}</td>
      </tr>
    `;
  }).join("");
}

function resetGame() {
  players = [];
  words = [];
  currentPlayerIndex = 0;
  currentRound = 1;
  gameActive = false;
  Object.keys(playerStats).forEach(p => delete playerStats[p]);
  
  document.getElementById("setupScreen").classList.remove("hidden");
  document.getElementById("passScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("gameOverScreen").classList.add("hidden");
  
  document.getElementById("playerInput").value = "";
  document.getElementById("wordInput").value = "";
  document.getElementById("wordCount").innerText = "";
  updatePlayerDisplay();
  
  clearInterval(timerInterval);
}

// Handle Enter key
document.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    if (!document.getElementById("setupScreen").classList.contains("hidden")) {
      if (document.activeElement.id === "playerInput") {
        addPlayer();
      } else if (document.activeElement.id === "wordInput") {
        addWord();
      }
    }
  }
});
</script>
</body>
</html>
